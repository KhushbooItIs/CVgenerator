<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Profile</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<form method="POST" class="bg-white p-6 rounded shadow-md w-96 space-y-4">
    {% csrf_token %}

    <h1 class="text-xl font-bold text-center">Create Profile</h1>

    <div>
        <label>Name</label>
        <input type="text" name="name" class="w-full border p-2 rounded">
    </div>

    <div>
        <label>Email</label>
        <input type="text" name="email" class="w-full border p-2 rounded">
    </div>

    <div>
        <label>Phone</label>
        <input type="text" name="phone" class="w-full border p-2 rounded">
    </div>

    <div>
        <label>School</label>
        <input type="text" name="school" class="w-full border p-2 rounded">
    </div>

    <div>
        <label>Degree</label>
        <input type="text" name="degree" class="w-full border p-2 rounded">
    </div>

    <div>
        <label>University</label>
        <input type="text" name="university" class="w-full border p-2 rounded">
    </div>

    <div>
        <label>Summary</label>
        <input type="text" name="summary" class="w-full border p-2 rounded">
    </div>

    <div>
        <label>Previous Work</label>
        <input type="text" name="previous_work" class="w-full border p-2 rounded">
    </div>

    <div>
        <label>Skill</label>
        <input type="text" name="skil" class="w-full border p-2 rounded">
    </div>

    <button class="w-full bg-blue-500 text-white p-2 rounded">
        Submit
    </button>
</form>

</body>
</html>
